[profile.default]
src            = "contracts"
out            = "out"
libs           = ["lib"]
script         = "script"
test           = "test"
cache_path     = "cache"

# Compiler
solc_version   = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true
evm_version    = "cancun"

# Reproducibility
bytecode_hash  = "none"
cbor_metadata  = false

# Gas reports
gas_reports    = ["*"]

# Filesystem permissions
fs_permissions = [
    { access = "read",       path = "./broadcast" },
    { access = "read-write", path = "./script"    },
]

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Fuzz
[profile.default.fuzz]
runs      = 10000
max_test_rejects = 65536

# Invariant
[profile.default.invariant]
runs   = 512
depth  = 128

# CI profile — lighter fuzz for faster pipelines
[profile.ci]
fuzz      = { runs = 256 }
invariant = { runs = 64 }
